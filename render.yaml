services:
  - type: web
    name: site-denuncias-bullying
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bullying-postgres
          property: connectionString

databases:
  - name: bullying-postgres
    plan: free
